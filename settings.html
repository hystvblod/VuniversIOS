<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title></title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    :root{
      --vr-bg: radial-gradient(circle at top, #f6e7cf 0, #1b6688 62%, #03279e 100%);
      --vr-overlay: none;
    }

    body.vr-body.page-settings{
      overflow-x:hidden;
    }

    /* ===== TOPBAR ===== */
    .vr-header{
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .vr-top-actions{
      width:100%;
      display:grid;
      grid-template-columns: 44px minmax(0, 1fr) 44px;
      align-items:start;
      column-gap:12px;
      padding: calc(18px + env(safe-area-inset-top)) 12px 6px;
    }

    .vr-top-slot{
      display:flex;
      min-width:0;
    }

    .vr-top-left{
      justify-content:flex-start;
      align-items:flex-start;
    }

    .vr-top-center{
      justify-content:center;
      align-items:center;
      text-align:center;
      min-width:0;
    }

    .vr-top-right{
      justify-content:flex-end;
      align-items:flex-start;
    }

    .vr-headerTitleWrap{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      text-align:center;
      gap:0;
      padding-top:4px;
    }

    .vr-headerTitleWrap .vr-section-title{
      margin:0;
      width:100%;
      text-align:center;
      line-height:1.05;
    }

    .vr-settingsIntroAboveCard{
      margin:10px auto 14px auto;
      width:100%;
      max-width:520px;
      text-align:center;
      font-size:13px;
      line-height:1.35;
      opacity:.86;
    }

    .vr-settingsSection--toggles .vr-toggleRow + .vr-toggleRow{
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid rgba(255,255,255,.10);
    }

    .vr-icon-button{
      width:44px;
      height:44px;
      border-radius:999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.26);
      box-shadow: 0 10px 22px rgba(0,0,0,0.22);
      padding:0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      text-decoration:none;
      -webkit-tap-highlight-color: transparent;
    }

    .vr-icon-button:active{
      transform: scale(.98);
    }

    .vr-icon-button img{
      width:30px;
      height:30px;
      object-fit:contain;
      display:block;
      pointer-events:none;
      user-select:none;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.65)) contrast(1.15) brightness(1.08);
    }

    .vr-back-ico{
      width:24px;
      height:24px;
      display:block;
      opacity:.98;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.65));
    }

    /* ===== CONTENT ===== */
    .vr-main{
      padding-left: calc(16px + env(safe-area-inset-left));
      padding-right: calc(16px + env(safe-area-inset-right));
      padding-bottom: calc(18px + env(safe-area-inset-bottom));
    }

    .vr-section-headCentered{
      display:none;
    }

    .vr-section-subtitle{
      margin:0;
      text-align:center;
      max-width: 520px;
      font-size: 13px;
      line-height: 1.35;
      opacity: .86;
    }

    /* ===== LANG GRID ===== */
    .vr-langGrid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap:10px;
      margin-top:22px;
      margin-bottom:22px;
    }

    @media (min-width: 520px){
      .vr-langGrid{
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    .vr-langBtn{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:0;
      padding:10px 6px;
      border-radius:14px;
      border:0 !important;
      background:transparent !important;
      box-shadow:none !important;
      color:inherit;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      text-align:center;
    }

    .vr-langBtn:active{
      transform: scale(.98);
    }

    .vr-langBtn.isActive{
      outline:0;
      box-shadow: 0 0 0 2px rgba(255,255,255,.22), 0 14px 34px rgba(0,0,0,.26) !important;
      background:transparent !important;
      border:0 !important;
    }

    .vr-flagBox{
      width:46px;
      height:32px;
      border-radius:8px;
      overflow:hidden;
      border:0 !important;
      outline:0 !important;
      box-shadow:none !important;
      background:transparent !important;
      flex: 0 0 auto;
    }

    .vr-flagBox svg{
      width:100%;
      height:100%;
      display:block;
    }

    .vr-langText{
      display:flex !important;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:32px;
      font-size:clamp(10px,2.5vw,12px);
      font-weight:800;
      line-height:1.1;
      color:rgba(255,255,255,.96);
      text-align:center;
      word-break:break-word;
    }

    .vr-langText > div:first-child{
      font-size:12px;
      font-weight:900;
      letter-spacing:.3px;
    }

    .vr-langText > div:last-child{
      font-size:10px;
      font-weight:700;
      opacity:.92;
    }

    /* ===== SECTIONS ===== */
    .vr-settingsSection{
      margin-top:18px;
      padding-top:14px;
      border-top: 1px solid rgba(255,255,255,.10);
    }

    .vr-settingsSectionTitle{
      font-weight:950;
      font-size:13px;
      letter-spacing:.2px;
      opacity:.92;
      margin:0 0 10px 0;
      text-align:center;
      width:100%;
    }

    /* ===== TOGGLE ADS ===== */
    .vr-toggleRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:8px 0;
      border:0;
      background:transparent;
    }

    .vr-toggleText{
      min-width:0;
    }

    .vr-toggleLabel{
      font-weight:950;
      line-height:1.2;
      margin:0;
    }

    .vr-toggleDesc{
      margin:6px 0 0 0;
      opacity:.78;
      font-size:12px;
      line-height:1.25;
    }

    .vr-privacyBtn{
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.08);
      color:#fff;
      font-weight:900;
      cursor:pointer;
      flex:0 0 auto;
    }

    .vr-switch{
      position:relative;
      width:54px;
      height:32px;
      flex:0 0 auto;
    }

    .vr-switch input{
      position:absolute;
      inset:0;
      opacity:0;
      width:100%;
      height:100%;
      margin:0;
      cursor:pointer;
    }

    .vr-switchUi{
      position:absolute;
      inset:0;
      border-radius:999px;
      background: rgba(0,0,0,.28);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 10px 22px rgba(0,0,0,0.18);
      transition: .18s ease;
    }

    .vr-switchUi::after{
      content:"";
      position:absolute;
      top:4px;
      left:4px;
      width:24px;
      height:24px;
      border-radius:999px;
      background: rgba(255,255,255,.92);
      box-shadow: 0 10px 18px rgba(0,0,0,.22);
      transition: .18s ease;
    }

    .vr-switch input:checked + .vr-switchUi{
      background: rgba(255,255,255,.14);
      border-color: rgba(255,255,255,.22);
      box-shadow: 0 10px 22px rgba(0,0,0,0.18), 0 0 0 1px rgba(255,59,59,.12) inset;
    }

    .vr-switch input:checked + .vr-switchUi::after{
      transform: translateX(22px);
    }

    /* ===== FAQ LINK ===== */
    .vr-navRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 0;
      border:0;
      background:transparent;
      text-decoration:none;
      color:inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .vr-navRow:active{
      transform: scale(.995);
    }

    .vr-navText{
      min-width:0;
    }

    .vr-navLabel{
      font-weight:950;
      line-height:1.2;
      margin:0;
    }

    .vr-navDesc{
      margin:6px 0 0 0;
      opacity:.78;
      font-size:12px;
      line-height:1.25;
    }

    .vr-navArrow{
      flex:0 0 auto;
      font-size:18px;
      font-weight:900;
      opacity:.82;
      line-height:1;
    }

    /* ===== HELP ===== */
    .vr-helpLine{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:8px 0;
      border:0;
      background:transparent;
      margin-top:10px;
      overflow:hidden;
      text-align:center;
      flex-wrap:wrap;
    }

    .vr-helpLabel{
      font-weight:950;
      opacity:.92;
    }

    .vr-helpMail{
      opacity:.86;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
      color:inherit;
      text-decoration:none;
    }

    .vr-helpMail:hover,
    .vr-helpMail:focus-visible{
      text-decoration:underline;
    }

    .vr-licensePre{
      margin:0;
      max-height:min(60vh, 520px);
      overflow:auto;
      white-space:pre-wrap;
      word-break:break-word;
      padding:12px;
      border-radius:12px;
      background:rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.12);
      font-size:12px;
      line-height:1.4;
      text-align:left;
    }

    #settingsMsg{
      margin-top:10px;
      min-height:18px;
      font-size:12px;
      line-height:1.3;
      opacity:.85;
    }
  </style>
</head>

<body class="vr-body page-settings">
  <header class="vr-header">
    <div class="vr-top-actions">
      <div class="vr-top-slot vr-top-left">
        <a id="btnBackHome" class="vr-icon-button" href="index.html" aria-label="">

            <path fill="white" d="M15.5 5.5a1 1 0 0 1 0 1.4L10.4 12l5.1 5.1a1 1 0 1 1-1.4 1.4l-5.8-5.8a1.2 1.2 0 0 1 0-1.4l5.8-5.8a1 1 0 0 1 1.4 0z"/>

  <div class="vr-overlay"></div>

  </main>


  <script src="js/supabase.min.js"></script>
  <script src="js/supabaseBootstrap.js"></script>

  <script src="js/onesignal.js"></script>
  <script src="js/ads.js"></script>
  <script src="js/i18n.js"></script>

  <script src="js/audio.js"></script>
  <script>
    window.VRAudio?.startMenuBg?.();
  </script>

  <script>
  (async () => {
    "use strict";

    const LangStorageKey = "vuniverse_lang";
    const LangStorageLegacyKey = "vrealms_lang";

    const LANGS = [
      { code:"en",   ui:"EN",   nameKey:"ui.lang_name.en"   },
      { code:"fr",   ui:"FR",   nameKey:"ui.lang_name.fr"   },
      { code:"de",   ui:"DE",   nameKey:"ui.lang_name.de"   },
      { code:"es",   ui:"ES",   nameKey:"ui.lang_name.es"   },
      { code:"pt",   ui:"PT",   nameKey:"ui.lang_name.pt"   },
      { code:"ptbr", ui:"PTBR", nameKey:"ui.lang_name.ptbr" },
      { code:"it",   ui:"IT",   nameKey:"ui.lang_name.it"   },
      { code:"ko",   ui:"KO",   nameKey:"ui.lang_name.ko"   },
      { code:"ja",   ui:"JP",   nameKey:"ui.lang_name.ja"   },
      { code:"id",   ui:"ID",   nameKey:"ui.lang_name.id"   }
    ];

    function $(id){
      return document.getElementById(id);
    }

    function safeLower(x){
      return String(x || "").trim().toLowerCase();
    }

    function normalizeLang(raw){
      if(!raw) return null;
      const s = safeLower(raw);

      const map = {
        "pt-br":"ptbr",
        "pt_br":"ptbr",
        "pt-pt":"pt",
        "pt_pt":"pt",
        "jp":"ja",
        "ja-jp":"ja",
        "kr":"ko",
        "ko-kr":"ko",
        "in":"id",
        "id-id":"id"
      };

      if(map[s]) return map[s];

      const base = s.split(/[-_]/)[0];
      if(base === "pt" && (s.includes("br") || s.includes("ptbr"))) return "ptbr";
      if(base === "ja") return "ja";
      if(base === "ko") return "ko";
      if(base === "in") return "id";

      return base || null;
    }

    function supported(code){
      const c = normalizeLang(code);
      return LANGS.some(x => x.code === c);
    }

    function getStoredLang(){
      try{
        const v = normalizeLang(localStorage.getItem(LangStorageKey));
        if(v && supported(v)) return v;
      }catch(_){}

      try{
        const v2 = normalizeLang(localStorage.getItem(LangStorageLegacyKey));
        if(v2 && supported(v2)) return v2;
      }catch(_){}

      try{
        const fromUserData = normalizeLang(window.VUserData?.getLang?.());
        if(fromUserData && supported(fromUserData)) return fromUserData;
      }catch(_){}

      return null;
    }

    function detectDeviceLang(){
      const list = Array.isArray(navigator.languages) && navigator.languages.length
        ? navigator.languages
        : [navigator.language];

      for(const cand of list){
        const base = normalizeLang(cand);
        if(base && supported(base)) return base;
      }
      return null;
    }

    function t(key){
      try{
        if(window.VRI18n && typeof window.VRI18n.t === "function"){
          return window.VRI18n.t(key) || "";
        }
      }catch(_){}
      return "";
    }

    const FLAGS = {
      fr: `<svg viewBox="0 0 30 20" aria-hidden="true"><rect width="10" height="20" x="0" y="0" fill="#1f4fbf"/><rect width="10" height="20" x="10" y="0" fill="#ffffff"/><rect width="10" height="20" x="20" y="0" fill="#d11f2e"/></svg>`,
      en: `<svg viewBox="0 0 30 20" aria-hidden="true">
        <rect width="30" height="20" fill="#fff"/>
        <g fill="#b22234">
          <rect y="0" width="30" height="1.538"/>
          <rect y="3.076" width="30" height="1.538"/>
          <rect y="6.152" width="30" height="1.538"/>
          <rect y="9.228" width="30" height="1.538"/>
          <rect y="12.304" width="30" height="1.538"/>
          <rect y="15.38" width="30" height="1.538"/>
          <rect y="18.456" width="30" height="1.544"/>
        </g>
        <rect width="12.6" height="10.77" fill="#3c3b6e"/>
        <g fill="#fff" opacity="0.95">
          <circle cx="1.8" cy="1.6" r=".35"/><circle cx="3.6" cy="1.6" r=".35"/><circle cx="5.4" cy="1.6" r=".35"/><circle cx="7.2" cy="1.6" r=".35"/><circle cx="9.0" cy="1.6" r=".35"/><circle cx="10.8" cy="1.6" r=".35"/>
          <circle cx="2.7" cy="2.8" r=".35"/><circle cx="4.5" cy="2.8" r=".35"/><circle cx="6.3" cy="2.8" r=".35"/><circle cx="8.1" cy="2.8" r=".35"/><circle cx="9.9" cy="2.8" r=".35"/>
          <circle cx="1.8" cy="4.0" r=".35"/><circle cx="3.6" cy="4.0" r=".35"/><circle cx="5.4" cy="4.0" r=".35"/><circle cx="7.2" cy="4.0" r=".35"/><circle cx="9.0" cy="4.0" r=".35"/><circle cx="10.8" cy="4.0" r=".35"/>
          <circle cx="2.7" cy="5.2" r=".35"/><circle cx="4.5" cy="5.2" r=".35"/><circle cx="6.3" cy="5.2" r=".35"/><circle cx="8.1" cy="5.2" r=".35"/><circle cx="9.9" cy="5.2" r=".35"/>
          <circle cx="1.8" cy="6.4" r=".35"/><circle cx="3.6" cy="6.4" r=".35"/><circle cx="5.4" cy="6.4" r=".35"/><circle cx="7.2" cy="6.4" r=".35"/><circle cx="9.0" cy="6.4" r=".35"/><circle cx="10.8" cy="6.4" r=".35"/>
          <circle cx="2.7" cy="7.6" r=".35"/><circle cx="4.5" cy="7.6" r=".35"/><circle cx="6.3" cy="7.6" r=".35"/><circle cx="8.1" cy="7.6" r=".35"/><circle cx="9.9" cy="7.6" r=".35"/>
          <circle cx="1.8" cy="8.8" r=".35"/><circle cx="3.6" cy="8.8" r=".35"/><circle cx="5.4" cy="8.8" r=".35"/><circle cx="7.2" cy="8.8" r=".35"/><circle cx="9.0" cy="8.8" r=".35"/><circle cx="10.8" cy="8.8" r=".35"/>
        </g>
      </svg>`,
      de: `<svg viewBox="0 0 30 20" aria-hidden="true"><rect width="30" height="6.67" y="0" fill="#111"/><rect width="30" height="6.67" y="6.67" fill="#d11f2e"/><rect width="30" height="6.66" y="13.34" fill="#f4c300"/></svg>`,
      es: `<svg viewBox="0 0 30 20" aria-hidden="true"><rect width="30" height="5" y="0" fill="#c8102e"/><rect width="30" height="10" y="5" fill="#f4c300"/><rect width="30" height="5" y="15" fill="#c8102e"/></svg>`,
      pt: `<svg viewBox="0 0 30 20" aria-hidden="true"><rect width="12" height="20" x="0" y="0" fill="#1a7f3b"/><rect width="18" height="20" x="12" y="0" fill="#c8102e"/><circle cx="12" cy="10" r="4.5" fill="#f4c300" opacity="0.95"/></svg>`,
      ptbr:`<svg viewBox="0 0 30 20" aria-hidden="true"><rect width="30" height="20" fill="#1a7f3b"/><path d="M15 3 L26 10 L15 17 L4 10 Z" fill="#f4c300"/><circle cx="15" cy="10" r="4" fill="#1f4fbf"/></svg>`,
      it: `<svg viewBox="0 0 30 20" aria-hidden="true"><rect width="10" height="20" x="0" y="0" fill="#1a7f3b"/><rect width="10" height="20" x="10" y="0" fill="#ffffff"/><rect width="10" height="20" x="20" y="0" fill="#c8102e"/></svg>`,
      ko: `<svg viewBox="0 0 30 20" aria-hidden="true"><rect width="30" height="20" fill="#ffffff"/><circle cx="15" cy="10" r="5" fill="#c8102e"/><path d="M15 5a5 5 0 0 0 0 10a2.5 2.5 0 0 1 0-5a2.5 2.5 0 0 0 0-5Z" fill="#0a3a87" opacity="0.95"/></svg>`,
      ja: `<svg viewBox="0 0 30 20" aria-hidden="true"><rect width="30" height="20" fill="#ffffff"/><circle cx="15" cy="10" r="5" fill="#d11f2e"/></svg>`,
      id: `<svg viewBox="0 0 30 20" aria-hidden="true"><rect width="30" height="10" y="0" fill="#d11f2e"/><rect width="30" height="10" y="10" fill="#ffffff"/></svg>`
    };

    function renderTexts(){
      const elTitle = $("settingsTitle");
      const elDesc = $("settingsLangDesc");

      if(elTitle) elTitle.textContent = t("ui.settings_title");
      if(elDesc) elDesc.textContent = t("ui.settings_lang_desc");
      if(t("ui.settings_title")) document.title = t("ui.settings_title");

      const back = $("btnBackHome");
      const prof = $("btnGoProfile");
      const grid = $("settingsLangGrid");
      const adsLabel = $("adsLabel");
      const adsDesc = $("adsDesc");
      const adsBtn = $("btnPrivacyOptions");
      const musicLabel = $("musicLabel");
      const musicDesc = $("musicDesc");
      const musicSw = $("musicSwitch");
      const faqTitle = $("settingsFaqTitle");
      const faqBtn = $("btnOpenFaq");
      const faqLabel = $("settingsFaqLabel");
      const faqDesc = $("settingsFaqDesc");
      const licensesBtn = $("btnOpenLicenses");
      const licensesLabel = $("settingsLicensesLabel");
      const helpTitle = $("settingsHelpTitle");
      const helpLab = $("helpEmailLabel");
      const helpVal = $("helpEmailValue");

      if(back) back.setAttribute("aria-label", t("ui.settings_back_home_aria"));
      if(prof) prof.setAttribute("aria-label", t("ui.settings_open_profile_aria"));
      if(grid) grid.setAttribute("aria-label", t("ui.language"));
      if(adsLabel) adsLabel.textContent = t("ui.settings_privacy_options_label");
      if(adsDesc) adsDesc.textContent = t("ui.settings_privacy_options_desc");
      if(adsBtn){
        adsBtn.textContent = t("ui.settings_privacy_options_button");
        adsBtn.setAttribute("aria-label", t("ui.settings_privacy_options_label"));
      }

      if(musicLabel) musicLabel.textContent = t("ui.settings_music_label");
      if(musicDesc) musicDesc.textContent = t("ui.settings_music_desc");
      if(musicSw) musicSw.setAttribute("aria-label", t("ui.settings_music_label"));

      if(faqTitle) faqTitle.textContent = t("ui.settings_faq_title");
      if(faqBtn) faqBtn.setAttribute("aria-label", t("ui.settings_open_faq_aria"));
      if(faqLabel) faqLabel.textContent = t("ui.settings_faq_label");
      if(faqDesc) faqDesc.textContent = t("ui.settings_faq_desc");
      if(licensesBtn) licensesBtn.setAttribute("aria-label", t("ui.settings_open_licenses_aria"));
      if(licensesLabel) licensesLabel.textContent = t("ui.settings_licenses_label");
      if(helpTitle) helpTitle.textContent = t("ui.settings_help_title");
      if(helpLab) helpLab.textContent = t("ui.settings_help_email_label");

      if(helpVal){
        const mail = t("ui.settings_help_email");
        helpVal.textContent = mail;
        helpVal.setAttribute("href", mail ? `mailto:${mail}` : "#");
      }
    }

    function buildGrid(){
      const grid = $("settingsLangGrid");
      if(!grid) return;

      grid.innerHTML = "";
      const cur = getStoredLang() || detectDeviceLang();
      const active = supported(cur) ? cur : "en";

      for(const L of LANGS){
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "vr-langBtn" + ((active === L.code) ? " isActive" : "");
        btn.setAttribute("data-lang", L.code);

        const flag = document.createElement("div");
        flag.className = "vr-flagBox";
        flag.innerHTML = FLAGS[L.code] || FLAGS.en;

        const txt = document.createElement("div");
        txt.className = "vr-langText";

        const code = document.createElement("div");
        code.textContent = L.ui;

        const name = document.createElement("div");
        name.textContent = t(L.nameKey) || L.ui;

        txt.appendChild(code);
        txt.appendChild(name);

        btn.appendChild(flag);
        btn.appendChild(txt);

        const ariaTpl = t("ui.settings_choose_lang_aria");
        btn.setAttribute("aria-label", ariaTpl ? ariaTpl.replace("{code}", L.ui) : L.ui);

        btn.addEventListener("click", () => setLanguage(L.code, { showMsg:true }));
        grid.appendChild(btn);
      }
    }

    function markActive(code){
      document.querySelectorAll(".vr-langBtn[data-lang]").forEach((b) => {
        b.classList.toggle("isActive", b.getAttribute("data-lang") === code);
      });
    }

    async function setLanguage(raw, opts = {}){
      const code = normalizeLang(raw) || "en";
      const safe = supported(code) ? code : "en";

      try{ localStorage.setItem(LangStorageKey, safe); }catch(_){}
      try{ localStorage.setItem(LangStorageLegacyKey, safe); }catch(_){}

      try{
        if(window.VUserData && typeof window.VUserData.save === "function"){
          const current = typeof window.VUserData.load === "function" ? window.VUserData.load() : {};
          window.VUserData.save({ ...current, lang: safe }, { silent:true });
        }
      }catch(_){}

      let remoteOk = true;

      try{
        if(window.VUserData && typeof window.VUserData.setLang === "function"){
          await window.VUserData.setLang(safe);
        } else if(window.VRRemoteStore && typeof window.VRRemoteStore.setLang === "function"){
          await window.VRRemoteStore.setLang(safe);
        }
      }catch(_){
        remoteOk = false;
      }

      try{
        if(window.VRI18n && typeof window.VRI18n.setLang === "function"){
          await window.VRI18n.setLang(safe);
        } else if(window.VRI18n && typeof window.VRI18n.initI18n === "function"){
          await window.VRI18n.initI18n();
        }
      }catch(_){}

      renderTexts();
      buildGrid();
      markActive(safe);

      const msg = $("settingsMsg");
      if(msg && opts.showMsg){
        msg.textContent = remoteOk
          ? t("ui.settings_msg_saved")
          : t("ui.settings_msg_saved_local");
      }
    }
    async function openPrivacyOptions() {
      let ok = false;

      try {
        ok = !!(await window.VRAds?.openGooglePrivacyOptionsForm?.());
      } catch (_) {}

      const msg = $("settingsMsg");
      if (msg) {
        msg.textContent = ok
          ? t("ui.settings_privacy_options_opened")
          : t("ui.settings_privacy_options_unavailable");
      }
    }


    function getMusicPref(){
      try{
        if(window.VRAudio && typeof window.VRAudio.isMusicEnabled === "function"){
          return !!window.VRAudio.isMusicEnabled();
        }
      }catch(_){}

      try{
        const v = localStorage.getItem("vrealms_music_enabled");
        if(v === "1") return true;
        if(v === "0") return false;
      }catch(_){}

      return true;
    }

    async function setMusicPref(value, { showMsg } = {}) {
      const on = !!value;

      try { localStorage.setItem("vrealms_music_enabled", on ? "1" : "0"); } catch (_) {}
      try { localStorage.setItem("vrealms_sfx_enabled", on ? "1" : "0"); } catch (_) {}

      try {
        window.VRAudio?.setMusicEnabled?.(on);
      } catch (_) {}

      try {
        window.VRAudio?.setSfxEnabled?.(on);
      } catch (_) {}

      if (!on) {
        try { window.VRAudio?.stopBackground?.(); } catch (_) {}
      } else {
        try { window.VRAudio?.startMenuBg?.(); } catch (_) {}
      }

      const box = $("musicEnabled");
      if (box) box.checked = on;

      const msg = $("settingsMsg");
      if (msg && showMsg) {
        msg.textContent = t("ui.settings_music_saved");
      }
    }

    try{ await window.bootstrapAuthAndProfile?.(); }catch(_){}
    try{ await window.VUserData?.init?.(); }catch(_){}
    try{ await window.VRI18n?.initI18n?.(); }catch(_){}

    renderTexts();
    buildGrid();

    await setLanguage(
      getStoredLang() || detectDeviceLang() || window.VRI18n?.getLang?.() || "en",
      { showMsg:false }
    );


    const adsBtn = $("btnPrivacyOptions");
    if(adsBtn){
      adsBtn.addEventListener("click", () => {
        void openPrivacyOptions();
      });
    }

    const musicBox = $("musicEnabled");
    if(musicBox){
      musicBox.checked = getMusicPref();
      musicBox.addEventListener("change", () => setMusicPref(musicBox.checked, { showMsg:true }));
    }

  })();
  </script>
</body>
</html>
