<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vuniverse - Partie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    html, body.vr-body-game {
      background: #0b1220 !important;
      overflow: hidden !important;
      height: 100% !important;
    }

    :root {
      --vr-bg: #0b1220 !important;
    }

    #vr-boot-overlay{
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, #f6e7cf 0, #1b6688 62%, #03279e 100%);
      opacity: 1;
      visibility: visible;
      transition: opacity .28s ease, visibility .28s ease;
      pointer-events: none;
    }

    body.vr-ready #vr-boot-overlay{
      opacity: 0;
      visibility: hidden;
    }

    .vr-boot-overlay-inner{
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 3vw, 18px);
      text-align: center;
      transform: translateY(-2vh);
    }

    .vr-boot-overlay-logo{
      width: min(84vw, 460px);
      max-height: clamp(120px, 24vw, 220px);
      height: auto;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 14px 34px rgba(0,0,0,.46));
      animation: vrGameLogoPulse 2.15s ease-in-out infinite;
      transform-origin: center center;
      will-change: transform, opacity;
    }

    .vr-boot-overlay-text{
      color: #ffffff;
      font-weight: 800;
      font-size: clamp(15px, 3.8vw, 20px);
      line-height: 1.2;
      letter-spacing: .2px;
      text-shadow: 0 2px 12px rgba(0,0,0,.45);
      opacity: .96;
      min-height: 1.2em;
      max-width: min(86vw, 520px);
    }

    @keyframes vrGameLogoPulse{
      0%{
        transform: scale(0.88);
        opacity: .88;
      }
      50%{
        transform: scale(1.12);
        opacity: 1;
      }
      100%{
        transform: scale(0.88);
        opacity: .88;
      }
    }
  </style>
</head>

<body class="vr-body vr-body-game" data-page="game">
  <div id="vr-boot-overlay" aria-hidden="true">
    <div class="vr-boot-overlay-inner">
      <img
        src="assets/img/ui/logo_vuniverse.webp"
        alt=""
        class="vr-boot-overlay-logo"
        draggable="false"
      />
      <div
        id="vr-boot-overlay-text"
        class="vr-boot-overlay-text"
        data-i18n="ui.loading"
      >Loading...</div>
    </div>
  </div>

  <a class="vr-icon-button" href="index.html" aria-label="Accueil"
     style="position:fixed; top:calc(10px + env(safe-area-inset-top)); left:14px; z-index:100002; pointer-events:auto;">
    <img class="vr-top-icon" src="assets/img/ui/btn_home.webp" alt="Accueil" draggable="false" />
  </a>

  <button id="btn-customize" class="vr-icon-button" type="button" aria-label="" data-i18n-aria="game.customize.aria"
     style="position:fixed; top:calc(10px + env(safe-area-inset-top)); right:14px; z-index:100002; pointer-events:auto;">
    <img class="vr-top-icon" src="assets/img/ui/btn_customize.svg" alt="" draggable="false" />
  </button>

  <div class="vr-top-actions vr-top-actions-game" aria-label="Top actions">
    <a class="vr-icon-button" href="profile.html" aria-label="Profil">
      <img class="vr-top-icon" src="assets/img/ui/btn_profile.webp" alt="" draggable="false" />
    </a>

    <a class="vr-icon-button" href="settings.html" aria-label="Paramètres">
      <img class="vr-top-icon" src="assets/img/ui/btn_settings.webp" alt="" draggable="false" />
    </a>

    <a class="vr-icon-button" href="shop.html" aria-label="Boutique">
      <img class="vr-top-icon" src="assets/img/ui/btn_shop.webp" alt="" draggable="false" />
    </a>
  </div>

  <main class="vr-main">

        <p class="vr-main-text" data-i18n="game.subtitle"></p>

            <button id="btn-vcoins" type="button"
                    class="vr-hud-icon-btn"
                    aria-label="VCoins"
                    aria-haspopup="dialog"
                    aria-controls="vr-coins-popup">

            <span class="vr-hud-value" id="meta-coins">0</span>

        </div>

        <div class="vr-hud-center">
          <div class="vr-hud-identity">
            <span class="vr-hud-name" id="meta-king-name">—</span>
            <span class="vr-hud-years" id="meta-years">0</span>
          </div>
        </div>

        <div class="vr-hud-right">
          <div class="vr-hud-item">
            <button id="btn-jeton" type="button"
                    class="vr-hud-icon-btn"
                    aria-label="Jeton"
                    aria-haspopup="dialog"
                    aria-controls="vr-token-popup">
             
            </button>
            <span class="vr-hud-value" id="meta-tokens">0</span>
          </div>
        </div>
      </div>

            <div class="vr-gauge-fill"></div>
          </div>
        </div>

        <div class="vr-gauge">
          <span class="vr-gauge-label"></span>
          <span class="vr-gauge-value">
            <span class="vr-gauge-val"></span>
            <span class="vr-gauge-delta"></span>
          </span>
          <div class="vr-gauge-frame">
            <div class="vr-gauge-preview"></div>
            <div class="vr-gauge-fill"></div>
          </div>
        </div>

        <div class="vr-gauge">
          <span class="vr-gauge-label"></span>
          <span class="vr-gauge-value">
            <span class="vr-gauge-val"></span>
            <span class="vr-gauge-delta"></span>
          </span>
          <div class="vr-gauge-frame">
            <div class="vr-gauge-preview"></div>
            <div class="vr-gauge-fill"></div>
          </div>
        </div>

        <div class="vr-gauge">
          <span class="vr-gauge-label"></span>
          <span class="vr-gauge-value">
            <span class="vr-gauge-val"></span>
            <span class="vr-gauge-delta"></span>
          </span>
          <div class="vr-gauge-frame">
            <div class="vr-gauge-preview"></div>

        </div>
      </div>

      <div class="vr-card-container">
        <div class="vr-card-stack">

            <h3 class="vr-card-title" id="card-title"></h3>
            <p class="vr-card-text" id="card-text"></p>

            <button class="vr-choice-button" data-choice="A" type="button">
              <span class="vr-choice-label" id="choice-A"></span>

            <button class="vr-choice-button" data-choice="B" type="button">

      <div id="vr-guide-overlay" class="vr-guide-overlay" aria-hidden="true">
        <div class="vr-guide-popup" role="status" aria-live="polite">

            <div id="vr-guide-bubble-fit" class="vr-guide-bubble-fit"></div>

            <div class="vr-guide-actions" id="vr-guide-actions-next">

        </div>

        <div class="vr-guide-figure">
          <img id="vr-guide-image" class="vr-guide-image" src="" alt="" draggable="false" />
        </div>
      </div>

      <div class="vr-popup" id="vr-token-popup" role="dialog" aria-modal="true" aria-hidden="true" inert>
        <div class="vr-popup-inner">
          <div class="vr-token-view" data-token-view="menu">
            <h3 class="vr-popup-title" data-i18n="token.popup.title"></h3>

            <button class="vr-card vr-token-card vr-token-card-big vr-token-ad-card vr-soft-pulse" type="button" data-token-action="adtoken">
              <div class="vr-card-content">
                <div class="vr-token-reward-top">
                  <img src="assets/img/ui/jeton.webp" alt="" draggable="false">
                  <span class="vr-token-reward-amount">+1</span>
                </div>
                <p class="vr-token-reward-sub" data-i18n="token.popup.ad.title"></p>
              </div>
            </button>

            <button class="vr-card vr-token-card" type="button" data-token-action="open_shop">
              <div class="vr-card-content">
                <h4 class="vr-card-title" data-i18n="token.popup.shop.title"></h4>
                <p class="vr-card-text" data-i18n="token.popup.shop.text"></p>
              </div>
            </button>

              <div class="vr-card-content">

                <p class="vr-card-text" data-i18n="token.popup.peek.text"></p>

            <button class="vr-card vr-token-card" type="button" data-token-action="gauge50">

                <p class="vr-card-text" data-i18n="token.popup.gauge50.text"></p>
              </div>
            </button>

            <button class="vr-card vr-token-card" type="button" data-token-action="back3">

                <h4 class="vr-card-title" data-i18n="token.popup.back3.title"></h4>
                <p class="vr-card-text" data-i18n="token.popup.back3.text"></p>

            </button>

                <p class="vr-card-text" data-i18n="coins.popup.close.text"></p>

                <h4 class="vr-card-title" data-i18n="common.close">Fermer</h4>
                <p class="vr-card-text" data-i18n="game.customize.close_text">Revenir à la partie</p>

      </div>

      <div class="vr-ending-overlay" id="vr-ending-overlay" aria-hidden="true">

          <button id="ending-restart-btn" class="vr-choice-button" type="button">
            <span data-i18n="game.restart"></span>
          </button>

          <button id="ending-revive-btn" class="vr-choice-button" type="button">
            <span data-i18n="game.revive"></span>
          </button>

          <button id="ending-return-btn" class="vr-choice-button" type="button">
            <span data-i18n="game.return"></span>
          </button>
        </div>
      </div>

      <div class="vr-popup" id="vr-revive-popup" role="dialog" aria-modal="true" aria-hidden="true" inert>
        <div class="vr-popup-inner">
          <div class="vr-token-view" data-revive-view="menu">
            <h3 class="vr-popup-title" data-i18n="revive.popup.title"></h3>
            <p class="vr-card-text" style="text-align:center" data-i18n="revive.popup.text"></p>

            <button class="vr-card vr-token-card" type="button" data-revive-action="token">
              <div class="vr-card-content">
                <h4 class="vr-card-title" data-i18n="revive.popup.use_token.title"></h4>
                <p class="vr-card-text" data-i18n="revive.popup.use_token.text"></p>
              </div>
            </button>

            <button class="vr-card vr-token-card vr-token-card-big" type="button" data-revive-action="ad">
              <div class="vr-card-content">
                <h4 class="vr-card-title" data-i18n="revive.popup.use_ad.title"></h4>
                <p class="vr-card-text" data-i18n="revive.popup.use_ad.text"></p>
              </div>
            </button>

            <button class="vr-card vr-token-card" type="button" data-revive-action="cancel">
              <div class="vr-card-content">
                <h4 class="vr-card-title" data-i18n="common.cancel"></h4>
                <p class="vr-card-text" data-i18n="revive.popup.cancel.text"></p>
              </div>
            </button>
          </div>
        </div>
      </div>

    </section>
  </main>

  <script>
    (function () {
      function isPreviewMode() {
        try {
          return new URLSearchParams(location.search).get("preview") === "1";
        } catch (_) {
          return false;
        }
      }

      async function boot() {
        const preview = isPreviewMode();
        window.__VR_PREVIEW_MODE = preview;

        if (!preview) {
          setTimeout(() => {
            try { window.bootstrapAuthAndProfile?.({ skipProfileFetch: true }); } catch (_) {}
          }, 0);
          try {
            const raw =
              localStorage.getItem("vuniverse_user_data") ||
              localStorage.getItem("vrealms_user_data");

            if (raw && window.VUserData && typeof window.VUserData.save === "function") {
              const parsed = JSON.parse(raw);
              if (parsed && typeof parsed === "object") {
                window.VUserData.save(parsed, { silent: true });
              }
            }
          } catch (_) {}
        }

        try {
          if (window.VRI18n && typeof window.VRI18n.initI18n === "function") {
            await window.VRI18n.initI18n();
          }
        } catch (_) {}

        return true;
      }

      window.__VR_BOOT_READY = boot();
    })();
  </script>
